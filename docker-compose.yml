version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: riskgrc
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d riskgrc"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/code
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-dev-key
      - DATABASE_ENGINE=django.db.backends.postgresql
      - DATABASE_NAME=riskgrc
      - DATABASE_USER=user
      - DATABASE_PASSWORD=password
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=http://localhost:19006,http://localhost:3000,http://127.0.0.1:19006
    depends_on:
      db:
        condition: service_healthy
    networks:
      - riskgrc-network

  frontend:
    build:
      context: ./mobile/RiskGRC
      dockerfile: Dockerfile
    command: npm run web
    volumes:
      - ./mobile/RiskGRC:/app
      - /app/node_modules
    ports:
      - "19006:19006"
    environment:
      - REACT_APP_API_URL=http://backend:8000/api
      - REACT_APP_ENV=development
      - NODE_ENV=development
    depends_on:
      - backend
    networks:
      - riskgrc-network

volumes:
  postgres_data:
    driver: local

networks:
  riskgrc-network:
    driver: bridge
