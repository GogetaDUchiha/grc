version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=riskgrc.settings
    volumes:
      - ./backend:/app
    depends_on:
      - db

  db:
    image: postgres:13
    environment:
      POSTGRES_DB: riskgrc
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mobile:
    build: ./mobile
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./mobile-output:/output
    depends_on:
      - backend

volumes:
  postgres_data:
  mobile-output: